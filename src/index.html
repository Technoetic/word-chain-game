<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>끝말잇기 vs AI</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components/game-board.css">
  <link rel="stylesheet" href="css/components/word-input.css">
  <link rel="stylesheet" href="css/components/word-history.css">
  <link rel="stylesheet" href="css/components/timer.css">
  <link rel="stylesheet" href="css/components/modal.css">
</head>
<body>
  <div class="app-container">
    <!-- 시작 화면 -->
    <div class="start-screen" id="startScreen">
      <h1 class="start-screen__title">끝말잇기</h1>
      <p class="start-screen__subtitle">vs AI</p>
      <p class="start-screen__desc">마이크로 말하여 AI와 끝말잇기 대결!</p>
      <button class="btn-primary start-btn" id="startBtn">게임 시작</button>
    </div>

    <!-- 게임 화면 -->
    <div class="game-screen" id="gameScreen" style="display:none;">
      <!-- 상단바 -->
      <header class="header">
        <div class="timer" id="timer">
          <span class="timer__text">30</span>
        </div>
      </header>

      <!-- 게임 영역 -->
      <main class="game-area">
        <div class="game-board">
          <div class="word-history" id="wordHistory">
            <!-- 단어 히스토리가 여기에 추가됨 -->
          </div>
        </div>
      </main>

      <!-- 입력 영역 (음성 전용) -->
      <footer class="input-area input-area--voice">
        <span class="stt-transcript" id="sttTranscript"></span>
        <div class="mic-wrapper" id="micWrapper">
          <div class="mic-ring" id="micRing"></div>
          <button class="mic-btn mic-btn--large" id="micBtn" title="음성 입력">
            <svg class="mic-btn__icon" viewBox="0 0 24 24" width="32" height="32">
              <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
              <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </button>
        </div>
        <span class="stt-hint" id="sttHint">마이크를 눌러 말하세요</span>
      </footer>
    </div>

    <!-- 게임 오버 모달 -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
      <div class="modal">
        <h2 class="modal__title" id="modalTitle">게임 종료</h2>
        <p class="modal__message" id="modalMessage"></p>
        <div class="modal__buttons">
          <button class="btn-primary" id="playAgainBtn">다시 하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/utils/constants.js"></script>
  <script src="js/utils/eventBus.js"></script>
  <script src="js/utils/koreanUtils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/game/GameState.js"></script>
  <script src="js/game/GameEngine.js"></script>
  <script src="js/stt/SpeechRecognitionManager.js"></script>
  <script src="js/stt/STTController.js"></script>
  <script src="js/websocket/WebSocketClient.js"></script>
  <script src="js/websocket/MessageHandler.js"></script>
  <script src="js/ui/Timer.js"></script>
  <script src="js/ui/ParticleEffect.js"></script>
  <script src="js/ui/WordHistory.js"></script>
  <script src="js/ui/WordInput.js"></script>
  <script src="js/ui/GameOverModal.js"></script>
  <script src="js/ui/GameBoard.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
