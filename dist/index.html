*,

*::after {
  margin: 0;
  padding: 0;

}

html {
  font-size: 16px;

}

body {

  padding: 0;

  line-height: 1.5;
  color: inherit;
  background-color: inherit;
}

button,
input,
select,
textarea {
  font: inherit;
  color: inherit;

button {

  <style>
/* Theme Variables and Base Styles */

:root {
  /* Backgrounds */
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1a2e;

  /* Text Colors */
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0b0;
  --text-muted: #707080;

  /* Player Colors */
  --color-user: #4fc3f7;
  --color-ai: #ff7043;

  /* Status Colors */
  --color-success: #66bb6a;
  --color-error: #ef5350;
  --color-warning: #ffa726;
  --color-combo: #ffd54f;

  /* Timer Colors */
  --timer-safe: #66bb6a;
  --timer-warn: #ffa726;
  --timer-danger: #ef5350;

  /* Borders and Dividers */
  --border-light: #2a2a3e;
  --border-medium: #3a3a4e;
  --border-dark: #1a1a2e;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.5);

  /* Transitions */
  --transition-fast: 150ms ease-in-out;
  --transition-normal: 300ms ease-in-out;
  --transition-slow: 500ms ease-in-out;
}

html {
  background-color: var(--bg-primary);
  color: var(--text-primary);
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  font-weight: 400;
  line-height: 1.6;
  letter-spacing: 0.3px;
}

/* Scrollbar Styling */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-secondary);
}

::-webkit-scrollbar-thumb {
  background: var(--border-medium);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--border-light);
}

/* Selection Styling */
::selection {
  background-color: var(--color-user);
  color: var(--bg-primary);
}

</style>
  <style>
/* Layout Structure */

.app-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* Start Screen */
.start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  padding: 40px 20px;
}

.start-screen__title {
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.start-screen__subtitle {
  font-size: 1.5rem;
  color: var(--color-ai);
  margin-bottom: 16px;
  font-weight: 600;
}

.start-screen__desc {
  font-size: 1rem;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.btn-primary {
  background-color: var(--color-user);
  color: var(--bg-primary);
  border: none;
  padding: 14px 40px;
  font-size: 1.1rem;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: background-color var(--transition-fast), transform var(--transition-fast);
  flex-shrink: 0;
  flex-grow: 0;
}

.start-btn {
  max-height: 52px;
}

.btn-primary:hover {
  background-color: #29b6f6;
  transform: translateY(-2px);
}

.btn-primary:active {
  transform: translateY(0);
}

/* Game Screen */
.game-screen {
  flex-direction: column;
  height: 100vh;
  width: 100vw;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background-color: var(--bg-secondary);
  border-bottom: 1px solid var(--border-medium);
  gap: 20px;
  flex-shrink: 0;
}

.game-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px;
  gap: 24px;
}

.input-area {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 24px;
  background-color: var(--bg-secondary);
  border-top: 1px solid var(--border-medium);
  gap: 12px;
  flex-shrink: 0;
}

/* Content Centering */
.game-board,
.word-history {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
}

/* Responsive Adjustments */
@media (max-width: 768px) {
  .header {
    padding: 12px 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .game-area {
    padding: 16px;
    gap: 16px;
  }

  .input-area {
    padding: 12px 16px;
    flex-direction: column;
  }
}

@media (max-width: 480px) {
  .header {
    padding: 10px 12px;
    font-size: 14px;
  }

  .game-area {
    padding: 12px;
    gap: 12px;
  }

  .input-area {
    padding: 10px 12px;
    gap: 8px;
  }

  .game-board,
  .word-history {
    max-width: 100%;
  }
}

</style>
  <style>
/* Keyframe Animations */

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.05);
  }
}

@keyframes shake {
  0%, 100% {
    transform: translateX(0);
  }
  25% {
    transform: translateX(-10px);
  }
  50% {
    transform: translateX(10px);
  }
  75% {
    transform: translateX(-10px);
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

@keyframes fadeOut {
  from {
    opacity: 1;
  }
  to {
    opacity: 0;
  }
}

@keyframes slideUp {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes slideIn {
  from {
    transform: translateX(-100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

@keyframes glow {
  0%, 100% {
    box-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
  }
  50% {
    box-shadow: 0 0 20px rgba(79, 195, 247, 0.6);
  }
}

@keyframes spin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
}

@keyframes comboFlash {
  0%, 100% {
    color: var(--color-combo);
    transform: scale(1);
  }
  50% {
    color: #ffff00;
    transform: scale(1.1);
  }
}

@keyframes timerPulse {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.08);
  }
}

@keyframes particleFade {
  0% {
    opacity: 1;
    transform: translateY(0);
  }
  100% {
    opacity: 0;
    transform: translateY(-30px);
  }
}

@keyframes blink {
  0%, 49%, 100% {
    opacity: 1;
  }
  50%, 99% {
    opacity: 0;
  }
}

@keyframes slideDown {
  from {
    transform: translateY(-20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes scaleIn {
  from {
    transform: scale(0.95);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes typingCursor {
  0%, 50% {
    border-right-color: var(--color-user);
  }
  51%, 100% {
    border-right-color: transparent;
  }
}

</style>

  <style>
/* Timer Component */

.timer {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 80px;
  height: 80px;
  min-width: 80px;
  position: relative;
  border-radius: 50%;
  background-color: var(--bg-primary);
  border: 2px solid var(--border-medium);
}

.timer__text {
  position: absolute;
  font-size: 28px;
  font-weight: 700;
  color: var(--timer-safe);
  text-align: center;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  z-index: 10;
}

.timer--warn .timer__text {
  color: var(--timer-warn);
  animation: pulse 0.8s ease-in-out infinite;
}

.timer--danger .timer__text {
  color: var(--timer-danger);
  animation: pulse 0.4s ease-in-out infinite;
}

.timer.hidden {
  display: none;
}

/* Timer Border Glow */
.timer::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: transparent;
  transition: all var(--transition-normal);
  pointer-events: none;
  z-index: -1;
}

.timer--warn::before {
  box-shadow: 0 0 15px rgba(255, 167, 38, 0.3);
}

.timer--danger::before {
  box-shadow: 0 0 20px rgba(239, 83, 80, 0.5);
  animation: pulse 0.5s ease-in-out infinite;
}

.timer--safe::before {
  box-shadow: 0 0 10px rgba(102, 187, 106, 0.2);
}

  <script>
class EventBus {
  constructor() {
    this._listeners = {};
  }

  on(event, handler) {
    if (!this._listeners[event]) {
      this._listeners[event] = [];
    }
    this._listeners[event].push(handler);
  }

  off(event, handler) {
    if (!this._listeners[event]) {
      return;
    }
    const index = this._listeners[event].indexOf(handler);
    if (index > -1) {
      this._listeners[event].splice(index, 1);
    }
  }

  emit(event, data) {
    if (!this._listeners[event]) {
      return;
    }
    this._listeners[event].forEach(handler => {
      handler(data);
    });
  }
}

  <script>
class KoreanUtils {
  static getLastChar(word) {
    if (!word || word.length === 0) {
      return '';
    }
    return word[word.length - 1];
  }

  static applyDueum(char) {
    const dueum = {
      '녀': '여', '뇨': '요', '뉴': '유', '니': '이',
      '라': '나', '래': '내', '려': '여', '례': '예',
      '료': '요', '류': '유', '리': '이', '로': '노',
      '루': '누', '르': '느'
    };

    const result = [char];
    if (dueum[char] && !result.includes(dueum[char])) {
      result.push(dueum[char]);
    }
    return result;
  }

  static isValidChain(prevWord, nextWord) {
    if (!prevWord || !nextWord) {
      return false;
    }

    const lastChar = this.getLastChar(prevWord);
    const firstChar = nextWord[0];

    // Direct match
    if (lastChar === firstChar) {
      return true;
    }

    // Dueum law match
    const validChars = this.applyDueum(lastChar);
    return validChars.includes(firstChar);
  }

  static getInitial(char) {
    if (!char || char.length === 0) {
      return '';
    }

    const code = char.charCodeAt(0);
    if (code < 0xAC00 || code > 0xD7A3) {
      return char;
    }

    const index = code - 0xAC00;
    const initial = Math.floor(index / (21 * 28));
    const initials = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

    return initials[initial];
  }
}

  <script>
class GameState {
  constructor() {
    this.usedWords = new Set();
    this.lastWord = '';
    this.turnCount = 0;
    this.isGameActive = false;
    this.isUserTurn = true;
  }

  reset() {
    this.usedWords.clear();
    this.lastWord = '';
    this.turnCount = 0;
    this.isGameActive = false;
    this.isUserTurn = true;
  }

  addWord(word, isUser) {
    const lowerWord = word.toLowerCase();
    this.usedWords.add(lowerWord);
    this.lastWord = lowerWord;
    this.turnCount += 1;
  }

  hasWord(word) {
    return this.usedWords.has(word.toLowerCase());
  }
}

</script>
  <script>
class GameEngine {
  constructor(eventBusInstance) {
    this.state = new GameState();
    this.wsClient = null;
    this.eventBus = eventBusInstance;
    this.setupEventListeners();
  }

  setupEventListeners() {
    this.eventBus.on(CONSTANTS.MSG_TYPES.WORD_RESULT, (data) => {
      this.handleWordResult(data);
    });

    this.eventBus.on(CONSTANTS.MSG_TYPES.LLM_TYPING, (data) => {
      this.handleLLMTyping(data);
    });

    this.eventBus.on(CONSTANTS.MSG_TYPES.LLM_COMPLETE, (data) => {
      this.handleLLMComplete(data);
    });

    this.eventBus.on(CONSTANTS.MSG_TYPES.GAME_OVER, (data) => {
      this.handleGameOver(data);
    });
  }

  setWebSocketClient(wsClient) {
    this.wsClient = wsClient;
  }

  startGame(difficulty) {
    this.state.reset();
    this.state.isGameActive = true;
    this.state.isUserTurn = true;

    if (this.wsClient) {
      this.wsClient.send(CONSTANTS.MSG_TYPES.GAME_START, {
        difficulty: difficulty || 'normal'
      });
    }
  }

  submitWord(word) {
    if (!word || word.length === 0) {
      this.eventBus.emit('word:invalid', {
        message: '빈 단어입니다.'
      });
      return;
    }

    if (this.state.hasWord(word)) {
      this.eventBus.emit('word:invalid', {
        message: '이미 사용한 단어입니다.'
      });
      return;
    }

    if (this.state.lastWord) {
      if (!KoreanUtils.isValidChain(this.state.lastWord, word)) {
        this.eventBus.emit('word:invalid', {
          message: '단어 연결이 올바르지 않습니다.'
        });
        return;
      }
    }

    this.state.addWord(word, true);
    this.state.isUserTurn = false;

    if (this.wsClient) {
      this.wsClient.send(CONSTANTS.MSG_TYPES.WORD_SUBMIT, {
        word: word,
        time_left: this.state.timeLeft || CONSTANTS.TIMER_DURATION
      });
    }
  }

  handleWordResult(data) {
    if (data.isCorrect) {
      this.eventBus.emit('word:accepted', {
        word: data.word,
        isUser: true
      });
    } else {
      this.eventBus.emit('word:rejected', {
        word: data.word,
        reason: data.reason
      });
    }
  }

  handleLLMTyping(data) {
    this.eventBus.emit('llm:typing', {
      partialWord: data.partialWord
    });
  }

  handleLLMComplete(data) {
    if (data.word) {
      this.state.addWord(data.word, false);
      this.eventBus.emit('llm:wordComplete', {
        word: data.word
      });
    }

    this.state.isUserTurn = true;
    this.eventBus.emit('game:userTurnStart', {
      lastWord: this.state.lastWord,
      timeLimit: CONSTANTS.TIMER_DURATION
    });
  }

  handleGameOver(data) {
    this.state.isGameActive = false;
    this.eventBus.emit('game:over', {
      winner: data.winner,
      totalTurns: this.state.turnCount
    });
  }

  endGame() {
    this.state.isGameActive = false;
    this.eventBus.emit('game:ended', {
      reason: 'user_quit'
    });
  }
}

</script>
  <script>
class SpeechRecognitionManager {
  constructor(language = 'ko-KR') {
    this.isListening = false;
    this.isSupported = true;
    this._callbacks = {
      onInterim: null,
      onFinal: null,
      onError: null,
      onStateChange: null
    };

    this._sttSocket = null;
    this._mediaStream = null;
    this._audioContext = null;
    this._processor = null;
    this._analyser = null;
    this._volumeRAF = null;
    this._onVolumeCallback = null;
  }

  async start() {
    if (this.isListening) return;

    try {
      this._mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          sampleRate: 16000,
          echoCancellation: true,
          noiseSuppression: true,
        }
      });

      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.host;
      this._sttSocket = new WebSocket(`${protocol}//${host}/ws/stt`);
      this._sttSocket.binaryType = 'arraybuffer';

      this._sttSocket.onopen = () => {
        this._startAudioProcessing();
        this.isListening = true;
        if (this._callbacks.onStateChange) {
          this._callbacks.onStateChange(true);
        }
      };

      this._sttSocket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'stt_result') {
          if (data.is_final) {
            if (this._callbacks.onFinal) {
              this._callbacks.onFinal(data.transcript);
            }
          } else {
            if (this._callbacks.onInterim) {
              this._callbacks.onInterim(data.transcript);
            }
          }
        } else if (data.type === 'stt_utterance_end') {
          if (this._callbacks.onUtteranceEnd) {
            this._callbacks.onUtteranceEnd();
          }
        } else if (data.type === 'stt_error') {
          if (this._callbacks.onError) {
            this._callbacks.onError(data.message);
          }
        }
      };

      this._sttSocket.onerror = () => {
        console.warn('[STT] connection error, will auto-restart');
        this._cleanup();
        this.isListening = false;
        this._autoRestart();
      };

      this._sttSocket.onclose = () => {
        if (this.isListening) {
          console.warn('[STT] connection closed, will auto-restart');
          this._cleanup();
          this.isListening = false;
          if (this._callbacks.onStateChange) {
            this._callbacks.onStateChange(false);
          }
          this._autoRestart();
        }
      };
    } catch (err) {
      if (this._callbacks.onError) {
        this._callbacks.onError('not-allowed');
      }
    }
  }

  _startAudioProcessing() {
    this._audioContext = new (window.AudioContext || window.webkitAudioContext)({
      sampleRate: 16000
    });

    const source = this._audioContext.createMediaStreamSource(this._mediaStream);
    this._processor = this._audioContext.createScriptProcessor(2048, 1, 1);

    // Volume analyser
    this._analyser = this._audioContext.createAnalyser();
    this._analyser.fftSize = 256;
    this._analyser.smoothingTimeConstant = 0.5;
    source.connect(this._analyser);
    this._startVolumeMonitor();

    this._processor.onaudioprocess = (e) => {
      if (this._sttSocket && this._sttSocket.readyState === WebSocket.OPEN) {
        const float32 = e.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        this._sttSocket.send(int16.buffer);
      }
    };

    source.connect(this._processor);
    this._processor.connect(this._audioContext.destination);
  }

  stop() {
    if (this._restartTimer) {
      clearTimeout(this._restartTimer);
      this._restartTimer = null;
    }
    this._cleanup();
    this.isListening = false;
    if (this._callbacks.onStateChange) {
      this._callbacks.onStateChange(false);
    }
  }

  abort() {
    this.stop();
  }

  _cleanup() {
    if (this._volumeRAF) {
      cancelAnimationFrame(this._volumeRAF);
      this._volumeRAF = null;
    }
    if (this._analyser) {
      this._analyser.disconnect();
      this._analyser = null;
    }
    if (this._onVolumeCallback) {
      this._onVolumeCallback(0);
    }
    if (this._processor) {
      this._processor.disconnect();
      this._processor = null;
    }
    if (this._audioContext) {
      this._audioContext.close().catch(() => {});
      this._audioContext = null;
    }
    if (this._mediaStream) {
      this._mediaStream.getTracks().forEach(t => t.stop());
      this._mediaStream = null;
    }
    if (this._sttSocket && this._sttSocket.readyState === WebSocket.OPEN) {
      this._sttSocket.close();
    }
    this._sttSocket = null;
  }

  _startVolumeMonitor() {
    const dataArray = new Uint8Array(this._analyser.frequencyBinCount);
    const tick = () => {
      if (!this._analyser) return;
      this._analyser.getByteFrequencyData(dataArray);
      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) {
        sum += dataArray[i];
      }
      const avg = sum / dataArray.length;
      const normalized = Math.min(avg / 128, 1);
      if (this._onVolumeCallback) {
        this._onVolumeCallback(normalized);
      }
      this._volumeRAF = requestAnimationFrame(tick);
    };
    this._volumeRAF = requestAnimationFrame(tick);
  }

  onVolume(callback) {
    this._onVolumeCallback = callback;
  }

  onInterim(callback) {
    this._callbacks.onInterim = callback;
  }

  onFinal(callback) {
    this._callbacks.onFinal = callback;
  }

  onError(callback) {
    this._callbacks.onError = callback;
  }

  onStateChange(callback) {
    this._callbacks.onStateChange = callback;
  }

  onUtteranceEnd(callback) {
    this._callbacks.onUtteranceEnd = callback;
  }

  _autoRestart() {
    if (this._restartTimer) return;
    this._restartTimer = setTimeout(() => {
      this._restartTimer = null;
      console.log('[STT] auto-restarting...');
      this.start();
    }, 1000);
  }
}

</script>
  <script>
class STTController {
  constructor() {
    this.sttManager = new SpeechRecognitionManager('ko-KR');
    this.isEnabled = this.sttManager.isSupported;
    this.wordInput = null;
    this._onInterimCallback = null;
    this._onFinalCallback = null;
    this._onListeningChangeCallback = null;
    this._onVolumeCallback = null;
    this._lastInterim = '';
    this._interimTimer = null;
    this._submitting = false;

    if (this.isEnabled) {
      this.sttManager.onInterim((text) => this._onInterimResult(text));
      this.sttManager.onFinal((text) => this._onFinalResult(text));
      this.sttManager.onError((error) => this._onError(error));
      this.sttManager.onStateChange((isListening) => this._onStateChange(isListening));
      this.sttManager.onVolume((level) => this._onVolume(level));
      this.sttManager.onUtteranceEnd(() => this._submitPendingInterim());
    }
  }

  setWordInput(wordInput) {
    this.wordInput = wordInput;
  }

  async toggleListening() {
    if (!this.isEnabled) {
      return;
    }

    if (this.sttManager.isListening) {
      this._submitPendingInterim();
      this.sttManager.stop();
    } else {
      this._lastInterim = '';
      await this.sttManager.start();
    }
  }

  _submitPendingInterim() {
    if (this._submitting) return;
    this._submitting = true;

    if (this._interimTimer) {
      clearTimeout(this._interimTimer);
      this._interimTimer = null;
    }
    if (this._lastInterim) {
      const text = this._lastInterim;
      this._lastInterim = '';
      this._onFinalResult(text);
    }

    this._submitting = false;
  }

  onInterimText(callback) {
    this._onInterimCallback = callback;
  }

  onFinalText(callback) {
    this._onFinalCallback = callback;
  }

  onListeningChange(callback) {
    this._onListeningChangeCallback = callback;

  onVolume(callback) {
    this._onVolumeCallback = callback;

  _onVolume(level) {
    if (this._onVolumeCallback) {
      this._onVolumeCallback(level);
    }
  }

  _onInterimResult(text) {
    const changed = text !== this._lastInterim;
    this._lastInterim = text;

    if (changed && text) {
      if (this._interimTimer) {
        clearTimeout(this._interimTimer);
      }
      this._interimTimer = setTimeout(() => {

    if (this._onInterimCallback) {

    this._lastInterim = '';
    if (this._interimTimer) {
      clearTimeout(this._interimTimer);
      this._interimTimer = null;

    // Extract Korean characters only
    const korean = text.replace(/[^가-힣]/g, '');
    if (!korean) return;
    text = korean;

    if (this._onFinalCallback) {
      this._onFinalCallback(text);
    }
    if (this.wordInput) {
      this.wordInput.setFinalText(text);

  _onStateChange(isListening) {

    if (this.wordInput) {
      this.wordInput.updateMicState(isListening);

class WebSocketClient {
  constructor(baseUrl) {
    this.baseUrl = baseUrl || CONFIG.WS_URL;
    this.socket = null;
    this.isConnected = false;
    this._handlers = {};
    this._reconnectAttempts = 0;
    this._maxReconnect = CONFIG.RECONNECT_MAX || 5;
    this._reconnectDelay = CONFIG.RECONNECT_DELAY || 1000;
    this._sessionId = null;
    this._messageQueue = [];
  }

  connect(sessionId) {
    this._sessionId = sessionId || this._generateSessionId();

    return new Promise((resolve, reject) => {
      try {
        this.socket = new WebSocket(this.baseUrl + this._sessionId);

        this.socket.onopen = () => {
          this.isConnected = true;
          this._reconnectAttempts = 0;
          this._flushQueue();
          resolve();
        };

        this.socket.onclose = () => {
          this.isConnected = false;
          if (this._onCloseCallback) {
            this._onCloseCallback();
          }
          this._reconnect();
        };

        this.socket.onerror = (error) => {
          if (this._onErrorCallback) {
            this._onErrorCallback(error);
          }
          if (!this.isConnected) {
            reject(error);
          }
        };

        this.socket.onmessage = (event) => {
          this._handleMessage(event);
        };
      } catch (error) {
        reject(error);
      }
    });
  }

  send(type, data = {}) {
    const message = { type, ...data };

    if (!this.isConnected) {
      this._messageQueue.push(message);
      return;
    }

    this.socket.send(JSON.stringify(message));
  }

  _flushQueue() {
    while (this._messageQueue.length > 0) {
      const msg = this._messageQueue.shift();
      this.socket.send(JSON.stringify(msg));
    }
  }

  on(type, handler) {
    if (!this._handlers[type]) {
      this._handlers[type] = [];
    }

    this._handlers[type].push(handler);
  }

  off(type, handler) {
    if (!this._handlers[type]) {
      return;
    }

    const index = this._handlers[type].indexOf(handler);
    if (index > -1) {
      this._handlers[type].splice(index, 1);
    }
  }

  onError(callback) {
    this._onErrorCallback = callback;
  }

  onClose(callback) {
    this._onCloseCallback = callback;
  }

  close() {
    this._maxReconnect = 0;
    if (this.socket) {
      this.socket.close();
    }
  }

  _handleMessage(event) {
    try {
      const message = JSON.parse(event.data);

      if (this._handlers[message.type]) {
        this._handlers[message.type].forEach((handler) => {
          handler(message);
        });
      }
    } catch (error) {
      console.error('Failed to parse message:', error);
    }
  }

  async _reconnect() {
    while (this._reconnectAttempts < this._maxReconnect) {
      this._reconnectAttempts++;
      const delay = this._reconnectDelay * Math.pow(2, this._reconnectAttempts - 1);

      await new Promise((resolve) => setTimeout(resolve, delay));

      try {
        await this.connect(this._sessionId);
        return;
      } catch (error) {
        console.error('Reconnection failed:', error);
      }
    }

    if (this._handlers['connection_failed']) {
      this._handlers['connection_failed'].forEach((handler) => {
        handler();
      });
    }
  }

  _generateSessionId() {
    const chars = '0123456789abcdef';
    let sessionId = '';

    for (let i = 0; i < 8; i++) {
      sessionId += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    return sessionId;
  }
}

/**
 * Timer UI Component
 * Manages countdown timer display with SVG circle progress indicator
 */
class Timer {
  constructor(elementSelector = '.timer') {
    this.element = document.querySelector(elementSelector);
    this.textEl = this.element.querySelector('.timer__text');
    this.duration = CONSTANTS.TIMER_DURATION || 15;
    this.remaining = this.duration;
    this._intervalId = null;
    this._onExpired = null;
  }

  start() {
    this.remaining = this.duration;
    this._updateDisplay();

    if (this._intervalId) {
      clearInterval(this._intervalId);
    }

    this._intervalId = setInterval(() => {
      this.remaining--;
      this._updateDisplay();

      if (this.remaining <= 0) {
        this.stop();
        if (this._onExpired) {
          this._onExpired();
        }
      }
    }, 1000);
  }

  stop() {
    if (this._intervalId) {
      clearInterval(this._intervalId);
      this._intervalId = null;
    }
  }

  reset(newDuration) {
    this.stop();
    if (newDuration !== undefined) {
      this.duration = newDuration;
    }
    this.remaining = this.duration;
    this.element.classList.remove('timer--danger', 'timer--warn');
    this._updateDisplay();
  }

  onExpired(callback) {
    this._onExpired = callback;
  }

  _updateDisplay() {
    this.textEl.textContent = this.remaining;

    // Apply color classes based on remaining time
    this.element.classList.remove('timer--danger', 'timer--warn', 'timer--safe');

    if (this.remaining < 3) {
      this.element.classList.add('timer--danger');
    } else if (this.remaining <= 5) {
      this.element.classList.add('timer--warn');
    } else {
      this.element.classList.add('timer--safe');
    }
  }
}

/**
 * ParticleEffect UI Component
 * Creates various particle and visual effects
 */
class ParticleEffect {
  static burst(x, y, color = '#66bb6a', count = 15) {
    const container = document.body;

    for (let i = 0; i < count; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      particle.style.backgroundColor = color;

      // Random velocity and direction
      const angle = (Math.PI * 2 * i) / count;
      const velocity = 5 + Math.random() * 5;
      const vx = Math.cos(angle) * velocity;
      const vy = Math.sin(angle) * velocity;

      container.appendChild(particle);

      // Animate particle
      let posX = x;
      let posY = y;
      const startTime = Date.now();
      const duration = 600;

      const animate = () => {
        const elapsed = Date.now() - startTime;
        const progress = elapsed / duration;

        if (progress >= 1) {
          particle.remove();
          return;
        }

        posX += vx;
        posY += vy;

        particle.style.left = posX + 'px';
        particle.style.top = posY + 'px';
        particle.style.opacity = 1 - progress;

        requestAnimationFrame(animate);
      };

      animate();
    }
  }

  static success() {
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    this.burst(centerX, centerY, '#66bb6a', 20);
  }

  static fail() {
    const overlay = document.createElement('div');
    overlay.className = 'flash-overlay flash-overlay--fail';
    document.body.appendChild(overlay);

    setTimeout(() => {
      overlay.remove();
    }, 300);
  }

  static combo() {
    const comboEl = document.querySelector('.combo-display');
    if (comboEl) {
      const rect = comboEl.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      this.burst(x, y, '#ffd700', 15);
    }
  }

  static screenShake(duration = 300) {
    const gameBoard = document.querySelector('.game-board');
    if (!gameBoard) return;

    const startTime = Date.now();
    const shake = () => {
      const elapsed = Date.now() - startTime;

      if (elapsed >= duration) {
        gameBoard.style.transform = 'translate(0, 0)';
        return;
      }

      const intensity = (1 - elapsed / duration) * 5;
      const x = (Math.random() - 0.5) * intensity;
      const y = (Math.random() - 0.5) * intensity;

      gameBoard.style.transform = `translate(${x}px, ${y}px)`;
      requestAnimationFrame(shake);
    };

    shake();
  }
}

/**
 * WordHistory UI Component
 * Displays word exchange history between player and LLM
 */
class WordHistory {
  constructor(containerSelector = '.word-history') {
    this.container = document.querySelector(containerSelector);
    this.items = [];
  }

  addUserWord(word) {
    const item = this._createWordItem(word, true);
    this.container.appendChild(item);
    this.items.push(item);
    this.scrollToBottom();
  }

  addRejectedWord(word, reason) {
    const item = document.createElement('div');
    item.className = 'word-item word-item--user word-item--rejected';

    const speaker = document.createElement('div');
    speaker.className = 'word-item__speaker';
    speaker.textContent = '나';

    const content = document.createElement('div');
    content.className = 'word-item__content';

    const wordEl = document.createElement('div');
    wordEl.className = 'word-item__word';
    wordEl.textContent = word;

    const meta = document.createElement('div');
    meta.className = 'word-item__meta';

    const badge = document.createElement('span');
    badge.className = 'word-item__dict-badge word-item__dict-badge--fail';
    badge.textContent = reason || '표준국어대사전에 없는 단어';
    meta.appendChild(badge);

    content.appendChild(wordEl);
    content.appendChild(meta);
    item.appendChild(speaker);
    item.appendChild(content);

    this.container.appendChild(item);
    this.items.push(item);
    this.scrollToBottom();

    setTimeout(() => {
      item.classList.add('word-item--fade-out');
      setTimeout(() => item.remove(), 400);
    }, 2500);
  }

  startLLMTyping() {
    const item = this._createWordItem('', false);
    item.classList.add('word-item--typing');
    const wordEl = item.querySelector('.word-item__word');
    const cursor = document.createElement('span');
    cursor.className = 'word-history__cursor';
    cursor.textContent = '|';
    wordEl.appendChild(cursor);
    this.container.appendChild(item);
    this.items.push(item);
    this.scrollToBottom();
  }

  addLLMTypingChar(char) {
    if (this.items.length === 0) return;

    const lastItem = this.items[this.items.length - 1];
    const wordEl = lastItem.querySelector('.word-item__word');
    const cursor = wordEl.querySelector('.word-history__cursor');

    if (cursor) {
      cursor.remove();
    }

    const charSpan = document.createElement('span');
    charSpan.textContent = char;
    wordEl.appendChild(charSpan);

    const newCursor = document.createElement('span');
    newCursor.className = 'word-history__cursor';
    newCursor.textContent = '|';
    wordEl.appendChild(newCursor);

    this.scrollToBottom();
  }

  finalizeLLMWord(word) {
    if (this.items.length === 0) return;

    const lastItem = this.items[this.items.length - 1];
    lastItem.classList.remove('word-item--typing');
    const cursor = lastItem.querySelector('.word-history__cursor');

    if (cursor) {
      cursor.remove();
    }

    const meta = lastItem.querySelector('.word-item__meta');
    if (meta && !meta.querySelector('.word-item__dict-badge')) {
      const badge = document.createElement('span');
      badge.className = 'word-item__dict-badge';
      badge.textContent = '국립국어원 확인';
      badge.title = '국립국어원 한국어기초사전에서 검증된 단어입니다';
      meta.appendChild(badge);
    }
  }

  startAIReaction() {
    const item = document.createElement('div');
    item.className = 'word-item word-item--ai word-item--reaction';

    const speaker = document.createElement('div');
    speaker.className = 'word-item__speaker';
    speaker.textContent = 'AI';

    const content = document.createElement('div');
    content.className = 'word-item__content';

    const textEl = document.createElement('div');
    textEl.className = 'word-item__reaction-text';

    content.appendChild(textEl);
    item.appendChild(speaker);
    item.appendChild(content);

    this.container.appendChild(item);
    this.items.push(item);
    this._reactionEl = textEl;
    this.scrollToBottom();
  }

  addAIReactionChar(char) {
    if (this._reactionEl) {
      this._reactionEl.textContent += char;
      this.scrollToBottom();
    }
  }

  finalizeAIReaction() {
    this._reactionEl = null;
  }

  removeLastTyping() {
    if (this.items.length === 0) return;
    const lastItem = this.items[this.items.length - 1];
    if (lastItem.classList.contains('word-item--typing')) {
      lastItem.remove();
      this.items.pop();
    }
  }

  scrollToBottom() {
    this.container.scrollTop = this.container.scrollHeight;
  }

  clear() {
    this.container.innerHTML = '';
    this.items = [];
  }

  _createWordItem(word, isUser) {
    const item = document.createElement('div');
    item.className = `word-item ${isUser ? 'word-item--user' : 'word-item--ai'}`;

    const speaker = document.createElement('div');
    speaker.className = 'word-item__speaker';
    speaker.textContent = isUser ? '나' : 'AI';

    const content = document.createElement('div');
    content.className = 'word-item__content';

    const wordEl = document.createElement('div');
    wordEl.className = 'word-item__word';
    wordEl.textContent = word;

    const meta = document.createElement('div');
    meta.className = 'word-item__meta';

    if (isUser) {
      const badge = document.createElement('span');
      badge.className = 'word-item__dict-badge';
      badge.textContent = '국립국어원 확인';
      badge.title = '국립국어원 한국어기초사전에서 검증된 단어입니다';
      meta.appendChild(badge);
    }

    content.appendChild(wordEl);
    content.appendChild(meta);

    item.appendChild(speaker);
    item.appendChild(content);

    return item;
  }
}

/**
 * GameBoard UI Component
 * Main container that orchestrates all UI sub-components
 */
class GameBoard {
  constructor(eventBus) {
    this.eventBus = eventBus;

    // Initialize sub-components
    this.timer = new Timer('.timer');
    this.wordHistory = new WordHistory('.word-history');
    this.wordInput = new WordInput('.input-area');
    this.gameOverModal = new GameOverModal('.modal-overlay');

    // Initialize STT controller
    this.sttController = new STTController();

    // Connect STT to WordInput
    this.sttController.onInterimText((text) => {
      this.wordInput.setInterimText(text);
    });

    this.sttController.onFinalText((text) => {
      this.wordInput.setFinalText(text);
    });

    this.sttController.onListeningChange((isListening) => {
      this.wordInput.updateMicState(isListening);
    });

    // Volume gauge
    this._micRing = document.getElementById('micRing');
    this.sttController.onVolume((level) => {
      if (this._micRing) {
        if (level > 0.01) {
          const size = 72 + level * 28;
          this._micRing.style.width = size + 'px';
          this._micRing.style.height = size + 'px';
          this._micRing.classList.add('mic-ring--active');
        } else {
          this._micRing.classList.remove('mic-ring--active');
          this._micRing.style.width = '72px';
          this._micRing.style.height = '72px';
        }
      }
    });

    this._setupEventListeners();
  }

  _setupEventListeners() {
    // Mic button click → toggle STT
    const micBtn = document.getElementById('micBtn');
    if (micBtn) {
      micBtn.addEventListener('click', () => {
        this.sttController.toggleListening();
      });
    }

    // Voice result auto-submit
    this.wordInput.onSubmit((word) => {
      if (word) {
        this.eventBus.emit('word_submitted', { word });
        this.wordInput.clear();
      }
    });

    // Game events from event bus
    this.eventBus.on('game_started', (data) => {
      this.resetUI();
      this.timer.start();
    });

    // Timer expired — send regardless of whose turn
    this.timer.onExpired(() => {
      this.eventBus.emit('timer_expired', {});
    });

    this.eventBus.on('word_result', (data) => {
      const { word, isCorrect, killerWord } = data;

      if (isCorrect) {
        this.timer.stop();
        this.wordHistory.addUserWord(word);
        ParticleEffect.success();

        // killer_word reaction is now streamed via ai_reaction events
      } else {
        this.wordInput.shake();
        ParticleEffect.fail();
        this.wordHistory.addRejectedWord(word, data.message);
      }
    });

    this.eventBus.on('ai_reaction', (data) => {
      const { char } = data;
      if (char === 'START') {
        this.wordHistory.startAIReaction();
      } else if (char === 'END') {
        this.wordHistory.finalizeAIReaction();
      } else {
        this.wordHistory.addAIReactionChar(char);
      }
    });

    this._llmTyping = false;
    this.eventBus.on('llm_typing', (data) => {
      const { char } = data;
      if (char === 'START') {
        if (this._llmTyping) {
          // Retry: remove previous failed typing item
          this.wordHistory.removeLastTyping();
        } else {
          // First attempt: start timer
          this.timer.reset();
          this.timer.start();
        }
        this._llmTyping = true;
        this.wordHistory.startLLMTyping();
      } else {
        this.wordHistory.addLLMTypingChar(char);
      }
    });

    this.eventBus.on('llm_complete', (data) => {
      const { word } = data;
      this._llmTyping = false;
      this.wordHistory.finalizeLLMWord(word);
      this._speakWord(word);
      this.timer.reset();
      this.timer.start();
    });

    this.eventBus.on('game_over', (data) => {
      this._llmTyping = false;
      this.timer.stop();
      this.gameOverModal.show(data);
    });

    this.eventBus.on('error', (data) => {
      const { message } = data;
      this.showError(message);
    });
  }

  _speakWord(word) {
    if (!window.speechSynthesis) return;
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'ko-KR';
    utterance.rate = 1.0;
    window.speechSynthesis.speak(utterance);
  }

  resetUI() {
    this.wordHistory.clear();
    this.wordInput.clear();
    this.wordInput.setEnabled(true);
    this.wordInput.focus();
    this.gameOverModal.hide();
    this.timer.reset();
  }

  showError(message) {
    const notification = document.createElement('div');
    notification.className = 'error-notification';
    notification.textContent = message;
    document.body.appendChild(notification);

    setTimeout(() => {
      notification.remove();
    }, 3000);
  }
}

</script>
  <script>
/**
 * Main Entry Point
 * Initializes the Korean word chain game application
 */

document.addEventListener('DOMContentLoaded', () => {
  const eventBus = new EventBus();
  const gameEngine = new GameEngine(eventBus);
  const wsClient = new WebSocketClient(CONFIG.WS_URL);
  const messageHandler = new MessageHandler(gameEngine, eventBus);
  const gameBoard = new GameBoard(eventBus);


  gameEngine.setWebSocketClient(wsClient);
  messageHandler.setupHandlers(wsClient);

  const startScreen = document.getElementById('startScreen');
  const gameScreen = document.getElementById('gameScreen');
  const startBtn = document.getElementById('startBtn');

  // Word submission from GameBoard
  eventBus.on('word_submitted', (data) => {
    gameEngine.submitWord(data.word);
  });

  // Timer expired → tell server
  eventBus.on('timer_expired', () => {
    wsClient.send('timer_expired', {});
  });

  // Start game button
  if (startBtn) {
    startBtn.addEventListener('click', () => {
      if (startScreen) startScreen.style.display = 'none';
      if (gameScreen) gameScreen.style.display = 'flex';
      gameEngine.startGame();
      // Emit game_started locally to activate UI immediately
      eventBus.emit('game_started', { difficulty: 'normal' });
    });
  }

  // Play again from modal
  gameBoard.gameOverModal.onPlayAgain(() => {
    gameEngine.startGame();
  });

  // Handle connection errors
  wsClient.onError((error) => {
    eventBus.emit('error', {
      message: '연결 오류가 발생했습니다.'
    });
  });

  wsClient.onClose(() => {
    eventBus.emit('error', {
      message: '서버와의 연결이 끊어졌습니다.'
    });
  });

  // Connect WebSocket
  wsClient.connect()
    .catch((err) => {
      console.error('WebSocket 연결 실패:', err);
    });
});

</script>
