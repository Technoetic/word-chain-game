<svg xmlns="http://www.w3.org/2000/svg" width="86" height="20" viewBox="0 0 86 20">
  <rect width="86" height="20" rx="3" fill="#1a1a2e"/>
  <g transform="translate(11,10) scale(0.6)">
    <!-- 외곽 원 -->
    <circle cx="0" cy="0" r="10" fill="#003478"/>
    <!-- 빨간색 반 - S자 형태 -->
    <!-- 상단 큰 반원(빨강) + 하단 작은 반원(빨강) 조합 -->
    <path d="
      M 0,-10
      A 10,10 0 0,1 0,10
      A 5,5 0 0,0 0,0
      A 5,5 0 0,1 0,-10
      Z
    " fill="#c60c30"/>
    <!-- 빨간 쪽 작은 원 (상단) -->
    <circle cx="0" cy="-5" r="2.2" fill="#c60c30"/>
    <!-- 파란 쪽 작은 원 (하단) -->
    <circle cx="0" cy="5" r="2.2" fill="#003478"/>
  </g>
  <text x="22" y="14" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11" fill="#ffffff">국립국어원</text>
</svg>
